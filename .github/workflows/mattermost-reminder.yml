name: Mattermost Reminder Bot

on:
  workflow_dispatch:
    inputs:
      reminder_type:
        description: "scrum | jira_morning | jira | jira_evening"
        required: true
        default: "scrum"
      channel_override:
        description: "테스트용 개인 채널 (@username 또는 channel_id). 비우면 기본 채널 사용"
        required: false
        default: ""
  repository_dispatch:
    types:
      - send_reminder
      - scrum
      - jira
      - jira_morning
      - jira_evening

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: |
          if [ -z "$MATTERMOST_WEBHOOK_URL" ]; then
            echo "Missing required secret: MATTERMOST_WEBHOOK_URL"
            exit 1
          fi

      - name: Resolve reminder type
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            type="${{ github.event.inputs.reminder_type }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            action_type="${{ github.event.action }}"
            payload_type="${{ github.event.client_payload.reminder_type }}"
            if [ -n "$payload_type" ]; then
              type="$payload_type"
            else
              type="$action_type"
            fi
          else
            echo "Unsupported event: ${{ github.event_name }}"
            exit 1
          fi

          case "$type" in
            scrum|jira_morning|jira|jira_evening) ;;
            *)
              echo "Unsupported reminder type: $type"
              exit 1
              ;;
          esac

          echo "type=$type" >> "$GITHUB_OUTPUT"

      - name: Resolve channel target
        id: target
        shell: bash
        run: |
          channel="${{ secrets.MATTERMOST_CHANNEL }}"
          strict_channel_override="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.channel_override }}" ]; then
            channel="${{ github.event.inputs.channel_override }}"
            strict_channel_override="true"
            echo "Using channel override for manual test run: $channel"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.channel_override }}" ]; then
            channel="${{ github.event.client_payload.channel_override }}"
            strict_channel_override="true"
            echo "Using channel override from repository_dispatch payload: $channel"
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "strict_channel_override=$strict_channel_override" >> "$GITHUB_OUTPUT"

      - name: Send to Mattermost
        run: python3 bot/reminder.py "${{ steps.resolve.outputs.type }}"
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          MATTERMOST_CHANNEL: ${{ steps.target.outputs.channel }}
          MATTERMOST_STRICT_CHANNEL_OVERRIDE: ${{ steps.target.outputs.strict_channel_override }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
