name: Mattermost Reminder Bot

on:
  workflow_dispatch:
    inputs:
      reminder_type:
        description: "scrum | jira_morning | jira_evening"
        required: true
        default: "scrum"
  schedule:
    # DEBUG: KST 평일 하루 전체 5분 간격
    - cron: "*/5 * * * 1-5"
    # KST 평일 09:45 = UTC 00:45
    - cron: "45 0 * * 1-5"
    # KST 평일 10:00 = UTC 01:00
    - cron: "0 1 * * 1-5"
    # KST 평일 17:00 = UTC 08:00
    - cron: "0 8 * * 1-5"

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug schedule context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "kst_now=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"

      - name: Resolve reminder type
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.reminder_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "*/5 * * * 1-5" ]; then
            echo "type=scrum" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 0 * * 1-5" ]; then
            echo "type=scrum" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 1 * * 1-5" ]; then
            echo "type=jira_morning" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 * * 1-5" ]; then
            echo "type=jira_evening" >> "$GITHUB_OUTPUT"
          else
            echo "type=jira_morning" >> "$GITHUB_OUTPUT"
          fi

      - name: Send to Mattermost
        run: python3 bot/reminder.py "${{ steps.resolve.outputs.type }}"
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          MATTERMOST_CHANNEL: ${{ secrets.MATTERMOST_CHANNEL }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
